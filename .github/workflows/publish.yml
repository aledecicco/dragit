name: 'publish'

on:
  push:
    tags:
      - 'v*'
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: get tag message
        id: tag_message
        shell: bash
        run: |
          git fetch --tags --force --quiet

          TAG="${{ github.ref_name }}"
          BODY="$(git tag -l --format='%(contents)' ${{ github.ref_name }} )"

          if [ -z "$BODY" ]; then
            echo "No release notes found for tag "
            echo "$TAG"
            exit 1

          fi
          echo "Release notes:"
          echo "$BODY"

          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: |
          pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Dragit v__VERSION__'
          releaseBody: ${{ steps.tag_message.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: upload AUR package files
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" ! -name "*.tar.gz" | head -1)
          SHA=$(sha256sum "$APPIMAGE" | cut -d' ' -f1)

          sed "s/@VERSION@/${VERSION}/; s/@SHA256@/${SHA}/" \
            packaging/arch/PKGBUILD.template > Dragit_${VERSION}_arch.PKGBUILD

          cp packaging/arch/dragit.install Dragit_${VERSION}_arch.install

          gh release upload "v${VERSION}" Dragit_${VERSION}_arch.PKGBUILD Dragit_${VERSION}_arch.install --clobber
